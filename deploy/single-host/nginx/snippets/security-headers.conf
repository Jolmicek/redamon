# RedAmon common security headers (mode-independent, server scope).
# Installed to /etc/nginx/snippets/redamon-security-headers.conf and `include`d by both
# the https and http server templates. HSTS + CSP are added by the templates themselves
# (HSTS is https-only; CSP carries a per-host connect-src token).
#
# The webapp (Next.js) sets NO security headers of its own, so every header here is the
# authoritative one for the whole app.
add_header X-Frame-Options DENY always;
add_header X-Content-Type-Options nosniff always;
add_header Referrer-Policy strict-origin-when-cross-origin always;
add_header X-Robots-Tag "noindex, nofollow, noarchive, nosnippet" always;
# Disable powerful browser features the app never uses (defense-in-depth vs XSS/clickjacking).
add_header Permissions-Policy "accelerometer=(), autoplay=(), camera=(), display-capture=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=(), interest-cohort=()" always;
# Cross-origin isolation: the app is a single origin; nothing should open/embed it cross-site.
add_header Cross-Origin-Opener-Policy same-origin always;
add_header Cross-Origin-Resource-Policy same-origin always;

# Block hidden/sensitive files defensively (never served by the app anyway).
location ~ /\. { deny all; return 404; }
location ~ \.(env|pem|key|crt|sql|bak|old|swp|git)$ { deny all; return 404; }
