# RedAmon common reverse-proxy headers, included by every proxy_pass location.
# Installed to /etc/nginx/snippets/redamon-proxy-common.conf.
#
# SECURITY: the webapp trusts `X-Internal-Key` as a full auth bypass (service-to-service)
# and injects `X-User-Id`/`X-User-Role` downstream AFTER auth. A client that sets any of
# these could bypass authentication or spoof identity, so we CLEAR them on every request
# entering from the internet. The real internal callers reach the webapp over the Docker
# network, never through nginx.
proxy_http_version 1.1;
proxy_set_header Host $host;
proxy_set_header X-Real-IP $remote_addr;
# Pin XFF to the real peer (do NOT append the client-supplied chain -- it is attacker
# controlled at the edge and would poison the app's IP logic/logs).
proxy_set_header X-Forwarded-For $remote_addr;
proxy_set_header X-Forwarded-Proto $scheme;
proxy_set_header X-Internal-Key "";
proxy_set_header X-Scanner-Key "";
proxy_set_header X-User-Id "";
proxy_set_header X-User-Role "";
# Do not leak the upstream framework banner.
proxy_hide_header X-Powered-By;
